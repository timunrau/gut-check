services:
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ollama:/root/.ollama
    expose:
      - "11434"

  api:
    build:
      context: ./backend
    environment:
      APP_PASSWORD: ${APP_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-long-random-string}
      DATABASE_PATH: ${DATABASE_PATH:-/data/gutcheck.db}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-1024}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Winnipeg}
    volumes:
      - ./data:/data
    depends_on:
      - ollama
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
    ports:
      - "${WEB_PORT:-18080}:80"
    depends_on:
      - api

volumes:
  ollama:
